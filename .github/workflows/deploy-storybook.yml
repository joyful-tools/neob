name: Deploy Storybook

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

concurrency:
  group: deploy-storybook-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Storybook Preview
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0] != null && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: storybook-preview/pr-${{ github.event.workflow_run.pull_requests[0].number }}
      url: ${{ steps.deploy_preview.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run storybook:build

      - name: Deploy preview
        id: deploy_preview
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias pr-${{ github.event.workflow_run.pull_requests[0].number }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Add preview summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy_preview.outputs.deployment-url }}
        run: |
          echo "## Storybook Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview URL: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview alias: pr-${{ github.event.workflow_run.pull_requests[0].number }}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy Storybook to Cloudflare Workers
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: storybook-production
      url: ${{ steps.deploy_production.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run storybook:build

      - name: Deploy
        id: deploy_production
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Add production summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy_production.outputs.deployment-url }}
        run: |
          echo "## Storybook Production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production URL: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
