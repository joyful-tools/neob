name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Validate source, unit tests, Storybook, and distributable package
        run: bun run check

      - name: Report Storybook coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2.12.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: ./packages/neob-ui/vitest.config.ts
          json-summary-path: ./coverage/storybook/coverage-summary.json
          file-coverage-mode: changes
