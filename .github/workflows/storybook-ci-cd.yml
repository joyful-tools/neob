name: Storybook CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: storybook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint, typecheck, and validate Storybook interactions and accessibility
        run: bun run check

  preview:
    name: Deploy Storybook Preview
    if: github.event_name == 'pull_request'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: storybook-preview/pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy_preview.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run build-storybook

      - name: Deploy preview
        id: deploy_preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Add preview summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy_preview.outputs.deployment-url }}
        run: |
          echo "## Storybook Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview URL: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview alias: pr-${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy Storybook to Cloudflare Workers
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: storybook-production
      url: ${{ steps.deploy_production.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run build-storybook

      - name: Deploy
        id: deploy_production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Add production summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy_production.outputs.deployment-url }}
        run: |
          echo "## Storybook Production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production URL: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
